<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityAMIT - Thread Comments</title>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js"
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>

  <div class="app-container" style="margin-top: 10px;">
    <!-- Arrow Back to feed -->
    <div>
      <a href="index.html" class="btn btn-sm" id="btn-back-feed-id">
        <i data-lucide="arrow-left"></i> Feed Portal
      </a>
    </div>

    <!-- Active Target Post Card -->
    <div id="active-post-container" style="width: 100%;">
      <!-- Card loading shimmer -->
      <div class="glass-card shimmer shimmer-card"></div>
    </div>

    <!-- Comment Creator Box -->
    <div class="glass-card">
      <h3 class="comments-section-title" style="margin-bottom: 12px;">Add to discussion</h3>
      <form id="comment-add-form-uid" class="comment-input-box">
        <div class="form-group" style="margin-bottom: 0; flex: 1;">
          <input type="text" id="comment-input-text" class="input-glass" placeholder="Type your premium reply here..." required autocomplete="off">
        </div>
        <button type="submit" class="btn btn-primary" id="btn-comment-submit">
          <i data-lucide="message-square"></i> Send
        </button>
      </form>
    </div>

    <!-- Comments List Area -->
    <div class="glass-card" style="padding-top: 20px;">
      <h4 class="comments-section-title" id="comments-title-total-id" style="margin-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">Comments (0)</h4>
      
      <div id="comments-list-id" class="comments-list">
        <!-- List empty states / rows -->
        <p style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px 0;">No reply transmissions detected on this node yet.</p>
      </div>
    </div>
  </div>

  <!-- Shared Footer & Bottom Navigation -->
  <div id="footer-placeholder"></div>
  <div id="nav-placeholder"></div>

  <!-- App logic & SDK modules -->
  <script type="module" src="src/js/app.js"></script>
  <script type="module">
    import { ref, get, set, push, onValue, remove } from "firebase/database";
    import { onAuthStateChanged } from "firebase/auth";

    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get("id");

      if (!postId) {
        window.App.showToast("No thread ID parameter specified.", "error");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1200);
        return;
      }

      const activePostContainer = document.getElementById("active-post-container");
      const commentForm = document.getElementById("comment-add-form-uid");
      const commentInputText = document.getElementById("comment-input-text");
      const commentSubmitBtn = document.getElementById("btn-comment-submit");
      const commentsList = document.getElementById("comments-list-id");
      const commentsTitle = document.getElementById("comments-title-total-id");

      let currentUid = null;
      let userData = null;

      onAuthStateChanged(window.App.auth, async (user) => {
        if (!user) return;
        currentUid = user.uid;

        // Fetch commenter attributes
        const userRef = ref(window.App.db, `${window.App.DB_ROOT}/users/${user.uid}`);
        try {
          const snapshot = await get(userRef);
          if (snapshot.exists()) {
            userData = snapshot.val();
          }
        } catch (e) {
          console.error(e);
        }
      });

      // 1. Thread Post Listener
      const postRef = ref(window.App.db, `${window.App.DB_ROOT}/posts/${postId}`);
      onValue(postRef, (snapshot) => {
        if (!snapshot.exists()) {
          activePostContainer.innerHTML = `
            <div class="glass-card empty-state">
              <i data-lucide="unlink"></i>
              <h3>Post Not Found</h3>
              <p>The requested post node has been de-referenced or deleted.</p>
            </div>
          `;
          window.lucide.createIcons();
          if (window.App && window.App.hideLoader) window.App.hideLoader();
          return;
        }

        const post = snapshot.val();
        renderPost(post);
        if (window.App && window.App.hideLoader) window.App.hideLoader();
      });

      function renderPost(post) {
        const likesCount = post.likes ? Object.keys(post.likes).length : 0;
        const savesCount = post.saves ? Object.keys(post.saves).length : 0;
        const commentsCount = post.comments ? Object.keys(post.comments).length : 0;

        const isLiked = currentUid && post.likes && post.likes[currentUid] === true;
        const isSaved = currentUid && post.saves && post.saves[currentUid] === true;

        let imageHTML = "";
        if (post.image) {
          imageHTML = `
            <div class="post-image-container">
              <img src="${post.image}" class="post-image" alt="Broadcasting media" referrerpolicy="no-referrer">
            </div>
          `;
        }

        const authorAvatar = post.profilePicture || `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(post.username || 'A')}`;

        activePostContainer.innerHTML = `
          <div class="glass-card post-card" style="border-color: rgba(255,255,255,0.15);">
            <div class="post-header">
              <div class="post-meta">
                <span class="avatar-bubble" style="width:28px; height:28px; font-size:12px; overflow:hidden;">
                  <img src="${authorAvatar}" alt="Avatar" style="width:100%; height:100%; object-fit:cover; border-radius:50%;" referrerpolicy="no-referrer">
                </span>
                <span class="community-badge">c/${post.communityName || "all"}</span>
                <a href="profile-view.html?id=${post.uid}" class="author-name">u/${post.username}</a>
                <span class="post-time">${window.App.formatRelativeTime(post.createdAt)}</span>
              </div>
            </div>

            <h2 style="color:white; font-size:22px; line-height:1.3;">${escapeHTML(post.title)}</h2>
            <p class="post-content">${escapeHTML(post.content)}</p>

            ${imageHTML}

            <div class="post-actions">
              <button class="action-btn like-btn ${isLiked ? 'active' : ''}" id="btn-post-like-id">
                <i data-lucide="heart"></i>
                <span>${likesCount}</span>
              </button>
              <div class="action-btn">
                <i data-lucide="message-square"></i>
                <span>${commentsCount}</span>
              </div>
              <button class="action-btn save-btn ${isSaved ? 'active' : ''}" id="btn-post-save-id">
                <i data-lucide="bookmark"></i>
                <span>${savesCount}</span>
              </button>
            </div>
          </div>
        `;

        // Action Toggles
        document.getElementById("btn-post-like-id").addEventListener("click", () => handleToggleAction("likes", isLiked));
        document.getElementById("btn-post-save-id").addEventListener("click", () => handleToggleAction("saves", isSaved));

        window.lucide.createIcons();
      }

      async function handleToggleAction(actionType, isActive) {
        if (!currentUid) {
          window.App.showToast("Authorized credentials needed.", "error");
          return;
        }

        const actionRef = ref(window.App.db, `${window.App.DB_ROOT}/posts/${postId}/${actionType}/${currentUid}`);
        try {
          if (isActive) {
            await remove(actionRef);
          } else {
            await set(actionRef, true);
          }
        } catch (e) {
          console.error(e);
        }
      }

      // 2. Realtime Comments Thread Listener
      const commentsRef = ref(window.App.db, `${window.App.DB_ROOT}/posts/${postId}/comments`);
      onValue(commentsRef, (snapshot) => {
        commentsList.innerHTML = "";
        
        if (!snapshot.exists()) {
          commentsTitle.textContent = "Comments (0)";
          commentsList.innerHTML = `
            <p style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px 0;">No reply transmissions detected on this node yet.</p>
          `;
          if (window.App && window.App.hideLoader) window.App.hideLoader();
          return;
        }

        const listObj = snapshot.val();
        const commentsArr = Object.keys(listObj).map(key => ({
          id: key,
          ...listObj[key]
        })).sort((a,b) => b.createdAt - a.createdAt); // Newest comments first

        commentsTitle.textContent = `Comments (${commentsArr.length})`;

        commentsArr.forEach(comment => {
          const commentAvatar = comment.profilePicture || `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(comment.username || 'A')}`;
          const row = document.createElement("div");
          row.className = "comment-item";
          row.innerHTML = `
            <span class="avatar-bubble" style="width:34px; height:34px; font-size:14px; flex-shrink:0; overflow:hidden;">
              <img src="${commentAvatar}" alt="Avatar" style="width:100%; height:100%; object-fit:cover; border-radius:50%;" referrerpolicy="no-referrer">
            </span>
            <div class="comment-content-wrap">
              <div class="comment-meta">
                <a href="profile-view.html?id=${comment.uid}" class="commenter-name">u/${comment.username || "anonymous"}</a>
                <span class="comment-time">${window.App.formatRelativeTime(comment.createdAt)}</span>
              </div>
              <p class="comment-body">${escapeHTML(comment.comment)}</p>
            </div>
          `;
          commentsList.appendChild(row);
        });

        window.lucide.createIcons();
        if (window.App && window.App.hideLoader) window.App.hideLoader();
      });

      // 3. Post Commentary Form Submit
      commentForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!currentUid || !userData) {
          window.App.showToast("Sign-in required to post replies.", "error");
          return;
        }

        const commentText = commentInputText.value.trim();
        if (!commentText) return;

        window.App.setButtonLoading(commentSubmitBtn, true);

        try {
          const newCommentRef = push(commentsRef);
          await set(newCommentRef, {
            id: newCommentRef.key,
            uid: currentUid,
            username: userData.username,
            profilePicture: userData.profilePicture || "",
            comment: commentText,
            createdAt: Date.now()
          });

          // Send Alert Notification to thread author (if it is not a self comment)
          const authorSnap = await get(ref(window.App.db, `${window.App.DB_ROOT}/posts/${postId}/uid`));
          if (authorSnap.exists() && authorSnap.val() !== currentUid) {
            await window.App.pushNotification(
              authorSnap.val(),
              `u/${userData.username} commented on your broadcast thread!`,
              `comments.html?id=${postId}`
            );
          }

          commentInputText.value = "";
          window.App.showToast("Comment transmitted.", "success");
        } catch (error) {
          console.error(error);
          window.App.showToast("Could not send comment reply.", "error");
        } finally {
          window.App.setButtonLoading(commentSubmitBtn, false);
        }
      });

      function escapeHTML(str) {
        if (!str) return "";
        return str.replace(/[&<>'"]/g, 
          tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
          }[tag] || tag)
        );
      }
    });
  </script>
</body>
</html>
