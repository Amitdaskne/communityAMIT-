<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityAMIT - Thread Comments</title>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js"
      }
    }
  </script>
  <script type="module" crossorigin src="/assets/comments-BntQ6nB2.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/app-DSFfU5DC.js">
  <link rel="stylesheet" crossorigin href="/assets/app-CtXFagLD.css">
</head>
<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>

  <div class="app-container" style="margin-top: 10px;">
    <!-- Arrow Back to feed -->
    <div>
      <a href="index.html" class="btn btn-sm" id="btn-back-feed-id">
        <i data-lucide="arrow-left"></i> Feed Portal
      </a>
    </div>

    <!-- Active Target Post Card -->
    <div id="active-post-container" style="width: 100%;">
      <!-- Card loading shimmer -->
      <div class="glass-card shimmer shimmer-card"></div>
    </div>

    <!-- Comment Creator Box -->
    <div class="glass-card">
      <h3 class="comments-section-title" style="margin-bottom: 12px;">Add to discussion</h3>
      <form id="comment-add-form-uid" class="comment-input-box">
        <div class="form-group" style="margin-bottom: 0; flex: 1;">
          <input type="text" id="comment-input-text" class="input-glass" placeholder="Type your premium reply here..." required autocomplete="off">
        </div>
        <button type="submit" class="btn btn-primary" id="btn-comment-submit">
          <i data-lucide="message-square"></i> Send
        </button>
      </form>
    </div>

    <!-- Comments List Area -->
    <div class="glass-card" style="padding-top: 20px;">
      <h4 class="comments-section-title" id="comments-title-total-id" style="margin-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px;">Comments (0)</h4>
      
      <div id="comments-list-id" class="comments-list">
        <!-- List empty states / rows -->
        <p style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px 0;">No reply transmissions detected on this node yet.</p>
      </div>
    </div>
  </div>

  <!-- Shared Footer & Bottom Navigation -->
  <div id="footer-placeholder"></div>
  <div id="nav-placeholder"></div>

  <!-- App logic & SDK modules -->
</body>
</html>
