<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityAMIT - Edit Profile</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>

  <div class="app-container" style="margin-top: 10px;">
    <div class="glass-card">
      <div class="auth-header" style="text-align: left;">
        <h2 style="font-size: 24px; color: white; letter-spacing: 1px;"><i data-lucide="user-cog" style="display:inline-block; vertical-align:middle; margin-right:8px; color:var(--accent-color);"></i> EDIT PROFILE</h2>
        <p>Update your credentials shown inside CommunityAMIT</p>
      </div>

      <form id="edit-profile-form-uid" style="margin-top: 20px;">
        <!-- Profile Picture block -->
        <div class="form-group" style="margin-bottom: 20px;">
          <label class="form-label">Profile Picture (Required)</label>
          
          <!-- Selected Preview -->
          <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 12px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);">
            <div class="avatar-bubble" id="edit-avatar-preview-container" style="width: 60px; height: 60px; overflow: hidden; flex-shrink: 0; position: relative; border: 2px solid var(--accent-color);">
              <img id="edit-avatar-preview" src="" style="width:100%; height:100%; object-fit:cover; border-radius:50%;" referrerpolicy="no-referrer">
            </div>
            <div style="flex-grow: 1;">
              <p style="font-size: 13px; color: white; font-weight: 500;">Edit Profile Photo</p>
              <span id="edit-avatar-source-label" style="font-size: 11px; color: var(--text-secondary); display: block;">Loading current image...</span>
              <!-- Upload progress bar container -->
              <div id="edit-upload-progress-container" style="display: none; width: 100%; background: rgba(255,255,255,0.08); height: 5px; border-radius: 4px; overflow: hidden; margin-top: 6px; border: 1px solid rgba(255,255,255,0.05);">
                <div id="edit-upload-progress-bar" style="width: 0%; height: 100%; background: #ffffff; transition: width 0.1s ease-out;"></div>
              </div>
            </div>
          </div>

          <!-- Buttons: Upload or Generate -->
          <div style="display: flex; gap: 10px; margin-bottom: 5px;">
            <button type="button" class="btn btn-sm" id="btn-edit-upload-avatar" style="flex: 1; height: 38px;">
              <i data-lucide="upload" style="width: 14px; height: 14px; display: inline-block; vertical-align: middle;"></i> Upload Photo
            </button>
            <button type="button" class="btn btn-sm" id="btn-edit-random-avatar" style="flex: 1; height: 38px; background: rgba(255, 255, 255, 0.08); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.15);">
              <i data-lucide="refresh-cw" style="width: 14px; height: 14px; display: inline-block; vertical-align: middle;"></i> Rotate Preset
            </button>
          </div>
          
          <input type="file" id="edit-avatar-file" accept="image/*" style="display: none;">
          <input type="hidden" id="edit-avatar-url" value="">
        </div>

        <div class="form-group">
          <label class="form-label" for="edit-fullname">Full Name</label>
          <input type="text" id="edit-fullname" class="input-glass" placeholder="Your Full Name" required autocomplete="name">
        </div>

        <div style="display: flex; gap: 12px; margin-top: 24px;">
          <a href="profile.html" class="btn w-full text-center" style="flex:1;">
            Cancel
          </a>
          <button type="submit" class="btn btn-primary w-full" id="btn-save-profile" style="flex:1;">
            <i data-lucide="save"></i> Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Shared Footer & Bottom Navigation -->
  <div id="footer-placeholder"></div>
  <div id="nav-placeholder"></div>

  <!-- App logic & SDK modules -->
  <script type="module" src="/src/js/app.js"></script>
  <script type="module">
    import { ref, get, update } from "firebase/database";
    import { onAuthStateChanged } from "firebase/auth";

    document.addEventListener("DOMContentLoaded", () => {
      const editForm = document.getElementById("edit-profile-form-uid");
      const fullnameInput = document.getElementById("edit-fullname");
      const saveBtn = document.getElementById("btn-save-profile");
      
      const btnEditUploadAvatar = document.getElementById("btn-edit-upload-avatar");
      const btnEditRandomAvatar = document.getElementById("btn-edit-random-avatar");
      const editAvatarFile = document.getElementById("edit-avatar-file");
      const editAvatarPreview = document.getElementById("edit-avatar-preview");
      const editAvatarUrlInput = document.getElementById("edit-avatar-url");
      const editAvatarSourceLabel = document.getElementById("edit-avatar-source-label");

      let currentUser = null;

      // Rotate random avatar
      if (btnEditRandomAvatar) {
        btnEditRandomAvatar.addEventListener("click", () => {
          const randSeed = Math.random().toString(36).substring(7);
          const randPic = `https://api.dicebear.com/7.x/bottts/svg?seed=${randSeed}`;
          editAvatarUrlInput.value = randPic;
          editAvatarPreview.src = randPic;
          editAvatarSourceLabel.textContent = "Using Preset Avatar: " + randSeed;
        });
      }

      // Upload profile picture trigger
      if (btnEditUploadAvatar) {
        btnEditUploadAvatar.addEventListener("click", () => {
          editAvatarFile.click();
        });
      }

      if (editAvatarFile) {
        editAvatarFile.addEventListener("change", async (e) => {
          if (!e.target.files.length) return;
          const file = e.target.files[0];

          editAvatarSourceLabel.textContent = "Uploading image (0%)...";
          const progressContainer = document.getElementById("edit-upload-progress-container");
          const progressBar = document.getElementById("edit-upload-progress-bar");
          if (progressContainer) progressContainer.style.display = "block";
          if (progressBar) progressBar.style.width = "0%";

          try {
            const url = await window.App.uploadImageToCloudinary(file, (percent) => {
              editAvatarSourceLabel.textContent = `Uploading image (${percent}%)...`;
              if (progressBar) progressBar.style.width = `${percent}%`;
            });
            editAvatarUrlInput.value = url;
            editAvatarPreview.src = url;
            editAvatarSourceLabel.textContent = "Custom Profile Picture Verified ✔";
            window.App.showToast("Profile image uploaded successfully.", "success");
          } catch (err) {
            console.error(err);
            window.App.showToast("Cloudinary upload failed.", "error");
            editAvatarSourceLabel.textContent = "Failed uploading. Please try again.";
          } finally {
            if (progressContainer) {
              setTimeout(() => {
                progressContainer.style.display = "none";
              }, 1200);
            }
          }
        });
      }

      onAuthStateChanged(window.App.auth, async (user) => {
        if (!user) return;
        currentUser = user;

        // Fetch current profile data
        const profileRef = ref(window.App.db, `${window.App.DB_ROOT}/users/${user.uid}`);
        try {
          const snapshot = await get(profileRef);
          if (snapshot.exists()) {
            const profile = snapshot.val();
            fullnameInput.value = profile.fullName || "";
            
            // Set initial avatar values
            const pPic = profile.profilePicture || `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(profile.username || user.uid)}`;
            editAvatarUrlInput.value = pPic;
            editAvatarPreview.src = pPic;
            editAvatarSourceLabel.textContent = "Profile Picture Synchronized";
          }
        } catch (e) {
          console.error("Failed to load user profile:", e);
          window.App.showToast("Error retrieving profile data.", "error");
        }
        
        window.lucide.createIcons();
      });

      editForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const updatedName = fullnameInput.value.trim();
        const profilePicture = editAvatarUrlInput.value;

        if (!updatedName) {
          window.App.showToast("Name cannot be blank.", "error");
          return;
        }

        window.App.setButtonLoading(saveBtn, true);

        try {
          const profileRef = ref(window.App.db, `${window.App.DB_ROOT}/users/${currentUser.uid}`);
          await update(profileRef, {
            fullName: updatedName,
            profilePicture: profilePicture
          });

          window.App.showToast("Profile credentials updated.", "success");
          setTimeout(() => {
            window.location.href = "profile.html";
          }, 1000);
        } catch (error) {
          console.error("Profile edit error:", error);
          window.App.showToast("Error committing changes.", "error");
          window.App.setButtonLoading(saveBtn, false);
        }
      });
    });
  </script>
</body>
</html>
