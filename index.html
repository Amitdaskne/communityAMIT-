<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityAMIT - Realtime Portal</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" crossorigin src="/assets/main-tUufYwnN.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/app-DSFfU5DC.js">
  <link rel="stylesheet" crossorigin href="/assets/app-CtXFagLD.css">
</head>
<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>

  <div class="app-container" style="margin-top: 10px;">
    <!-- Search Bar -->
    <div class="feed-filter-bar">
      <div class="search-container-inline">
        <i data-lucide="search" class="search-icon-fixed"></i>
        <input type="text" id="feed-search-input" class="input-glass w-full" placeholder="Realtime search posts...">
      </div>
      <a href="create-post.html" class="btn btn-primary btn-sm" id="btn-quick-create">
        <i data-lucide="plus"></i> New Post
      </a>
    </div>

    <!-- Posts Container Feed -->
    <div id="feed-posts-container" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
      <!-- Shimmer skeletons while loading state -->
      <div class="glass-card shimmer shimmer-card"></div>
      <div class="glass-card shimmer shimmer-card"></div>
    </div>
  </div>

  <!-- Shared Footer & Bottom Navigation -->
  <div id="footer-placeholder"></div>
  <div id="nav-placeholder"></div>

  <!-- App logic & SDK modules -->
</body>
</html>
