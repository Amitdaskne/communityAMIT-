<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityAMIT - Alerts Node</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" crossorigin src="/assets/notifications-BSCE2mt7.js"></script>

<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>

  <div class="app-container" style="margin-top: 10px;">

    </div>
  </div>

  <!-- Shared Footer & Bottom Navigation -->
  <div id="footer-placeholder"></div>
  <div id="nav-placeholder"></div>

  <!-- App logic & SDK modules -->
</body>
