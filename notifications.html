<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityAMIT - Alerts Node</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>

  <div class="app-container" style="margin-top: 10px;">
    <!-- Navigation row -->
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 8px;">
      <h3 style="font-size: 16px; color: white; letter-spacing: 1px;"><i data-lucide="bell" style="display:inline-block; vertical-align:middle; margin-right:6px; color:var(--accent-color);"></i> System Alerts</h3>
      <button class="btn btn-sm" id="btn-clear-notifications-id">
        <i data-lucide="check-square"></i> Clear All Alerts
      </button>
    </div>

    <!-- Notifications feed stream list -->
    <div id="notifications-stream-container" style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
      <div class="glass-card shimmer" style="height: 60px;"></div>
      <div class="glass-card shimmer" style="height: 60px; margin-top:10px;"></div>
    </div>
  </div>

  <!-- Shared Footer & Bottom Navigation -->
  <div id="footer-placeholder"></div>
  <div id="nav-placeholder"></div>

  <!-- App logic & SDK modules -->
  <script type="module" src="/src/js/app.js"></script>
  <script type="module">
    import { ref, onValue, remove, update } from "firebase/database";
    import { onAuthStateChanged } from "firebase/auth";

    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("notifications-stream-container");
      const btnClearAll = document.getElementById("btn-clear-notifications-id");
      let currentUid = null;

      onAuthStateChanged(window.App.auth, (user) => {
        if (!user) return;
        currentUid = user.uid;
        initAlertsListener();
      });

      function initAlertsListener() {
        const alertsRef = ref(window.App.db, `${window.App.DB_ROOT}/notifications/${currentUid}`);
        
        onValue(alertsRef, (snapshot) => {
          container.innerHTML = "";
          
          if (!snapshot.exists()) {
            renderEmptyAlerts();
            if (window.App && window.App.hideLoader) window.App.hideLoader();
            return;
          }

          const obj = snapshot.val();
          const list = Object.keys(obj)
            .map(key => ({ id: key, ...obj[key] }))
            .sort((a,b) => b.createdAt - a.createdAt);

          if (list.length === 0) {
            renderEmptyAlerts();
            if (window.App && window.App.hideLoader) window.App.hideLoader();
            return;
          }

          list.forEach(item => {
            const row = document.createElement("a");
            row.href = item.relativeUrl || "#";
            row.className = `notification-item ${!item.read ? 'unread' : ''}`;
            
            row.innerHTML = `
              <div class="notification-text">
                <div style="font-weight: 500; font-size:14px; color:white;">${escapeHTML(item.text)}</div>
                <div class="notification-time">${window.App.formatRelativeTime(item.createdAt)}</div>
              </div>
              <i data-lucide="arrow-right-circle" style="color:var(--text-muted); width:18px; height:18px;"></i>
            `;

            container.appendChild(row);

            // Mark single alert as read on click
            row.addEventListener("click", () => {
              if (!item.read) {
                const singleAlertRef = ref(window.App.db, `${window.App.DB_ROOT}/notifications/${currentUid}/${item.id}`);
                update(singleAlertRef, { read: true });
              }
            });
          });

          // Automatically trigger badge updates to read
          markAllAsRead(list);

          window.lucide.createIcons();
          if (window.App && window.App.hideLoader) window.App.hideLoader();
        });
      }

      function renderEmptyAlerts() {
        container.innerHTML = `
          <div class="glass-card empty-state">
            <i data-lucide="bell" style="color: var(--text-muted);"></i>
            <h3>Portal Clear</h3>
            <p>Your notification metrics are quiet. You have zero active system alerts.</p>
          </div>
        `;
        window.lucide.createIcons();
        if (window.App && window.App.hideLoader) window.App.hideLoader();
      }

      async function markAllAsRead(list) {
        const unreadItems = list.filter(item => !item.read);
        if (unreadItems.length === 0) return;

        const updates = {};
        unreadItems.forEach(item => {
          updates[`${window.App.DB_ROOT}/notifications/${currentUid}/${item.id}/read`] = true;
        });

        try {
          await update(ref(window.App.db), updates);
        } catch (e) {
          console.error(e);
        }
      }

      // Clear entire collection
      btnClearAll.addEventListener("click", async () => {
        if (!currentUid) return;
        const alertsRef = ref(window.App.db, `${window.App.DB_ROOT}/notifications/${currentUid}`);
        
        try {
          await remove(alertsRef);
          window.App.showToast("Alert node cleared.", "success");
        } catch (e) {
          console.error(e);
          window.App.showToast("Could not clear notification node.", "error");
        }
      });

      function escapeHTML(str) {
        if (!str) return "";
        return str.replace(/[&<>'"]/g, 
          tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
          }[tag] || tag)
        );
      }
    });
  </script>
</body>
</html>
