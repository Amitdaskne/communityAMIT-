<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityAMIT - Login</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" crossorigin src="/assets/login-DcYzPQJw.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/app-DSFfU5DC.js">
  <link rel="stylesheet" crossorigin href="/assets/app-CtXFagLD.css">
</head>
<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>

  <div class="app-container auth-box">
    <div class="glass-card" id="login-card-uid">
      <div class="auth-header">
        <h1>LOGIN</h1>
        <p>Access your glassmorphic portal to AMIT</p>
      </div>

      <form id="login-form-uid">
        <div class="form-group">
          <label class="form-label" for="login-username">Username</label>
          <input type="text" id="login-username" class="input-glass" placeholder="Enter your username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="input-glass" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary w-full" id="login-btn">
          <i data-lucide="log-in"></i> Sign In
        </button>
      </form>

      <div class="auth-links">
        <p>Forgot password? <a id="forgot-password-link">Reset here</a></p>
        <p style="margin-top: 10px;">New candidate? <a href="register.html">Create an Account</a></p>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <!-- App logic & SDK modules -->
</body>
</html>
