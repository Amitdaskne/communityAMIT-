<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityAMIT - Login</title>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js"
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>

  <div class="app-container auth-box">
    <div class="glass-card" id="login-card-uid">
      <div class="auth-header">
        <h1>LOGIN</h1>
        <p>Access your glassmorphic portal to AMIT</p>
      </div>

      <form id="login-form-uid">
        <div class="form-group">
          <label class="form-label" for="login-username">Username</label>
          <input type="text" id="login-username" class="input-glass" placeholder="Enter your username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="input-glass" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary w-full" id="login-btn">
          <i data-lucide="log-in"></i> Sign In
        </button>
      </form>

      <div class="auth-links">
        <p>Forgot password? <a id="forgot-password-link">Reset here</a></p>
        <p style="margin-top: 10px;">New candidate? <a href="register.html">Create an Account</a></p>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <!-- App logic & SDK modules -->
  <script type="module" src="src/js/app.js"></script>
  <script type="module">
    import { signInWithEmailAndPassword, sendPasswordResetEmail } from "firebase/auth";
    import { ref, get } from "firebase/database";

    document.addEventListener("DOMContentLoaded", () => {
      const loginForm = document.getElementById("login-form-uid");
      const loginBtn = document.getElementById("login-btn");
      const forgotLink = document.getElementById("forgot-password-link");

      // Sign In Logic
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const usernameInput = document.getElementById("login-username").value.trim().toLowerCase();
        const passwordInput = document.getElementById("login-password").value;

        if (!usernameInput || !passwordInput) {
          window.App.showToast("Fields cannot be left blank.", "error");
          return;
        }

        window.App.setButtonLoading(loginBtn, true);

        try {
          // Resolve username -> uid -> email
          const usernameRef = ref(window.App.db, `${window.App.DB_ROOT}/usernames/${usernameInput}`);
          const snapshot = await get(usernameRef);

          if (!snapshot.exists()) {
            window.App.showToast("Username not found.", "error");
            window.App.setButtonLoading(loginBtn, false);
            return;
          }

          const record = snapshot.val();
          let email = "";

          if (typeof record === "string") {
            if (record.includes("@")) {
              email = record;
            } else {
              const userRef = ref(window.App.db, `${window.App.DB_ROOT}/users/${record}`);
              const userSnap = await get(userRef);
              if (userSnap.exists()) {
                email = userSnap.val().email;
              }
            }
          } else if (record && typeof record === "object") {
            if (record.email) {
              email = record.email;
            } else if (record.uid) {
              const userRef = ref(window.App.db, `${window.App.DB_ROOT}/users/${record.uid}`);
              const userSnap = await get(userRef);
              if (userSnap.exists()) {
                email = userSnap.val().email;
              }
            }
          }

          if (!email) {
            window.App.showToast("Could not resolve email for this username.", "error");
            window.App.setButtonLoading(loginBtn, false);
            return;
          }

          // Authenticate email using Firebase Auth
          const userCredential = await signInWithEmailAndPassword(window.App.auth, email, passwordInput);
          const user = userCredential.user;

          // Block login if email is not verified
          if (!user.emailVerified) {
            window.App.showToast("Verification Required. Check your email inbox.", "error");
            window.App.setButtonLoading(loginBtn, false);
            return;
          }

          window.App.showToast("Access Granted. Synchronizing...", "success");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 1000);

        } catch (error) {
          console.error("Login failure:", error);
          let errMsg = "Authentication failed. Incorrect password or username.";
          if (error.code === "auth/invalid-credential") {
            errMsg = "Invalid username or password credentials.";
          }
          window.App.showToast(errMsg, "error");
          window.App.setButtonLoading(loginBtn, false);
        }
      });

      // Password Reset Logic
      forgotLink.addEventListener("click", async () => {
        const usernameInput = document.getElementById("login-username").value.trim().toLowerCase();

        if (!usernameInput) {
          window.App.showToast("Please enter your username above first.", "info");
          return;
        }

        try {
          // Resolve username is exist
          const usernameRef = ref(window.App.db, `${window.App.DB_ROOT}/usernames/${usernameInput}`);
          const snapshot = await get(usernameRef);

          if (!snapshot.exists()) {
            window.App.showToast("Unable to resolve username.", "error");
            return;
          }

          const record = snapshot.val();
          let email = "";

          if (typeof record === "string") {
            if (record.includes("@")) {
              email = record;
            } else {
              const userRef = ref(window.App.db, `${window.App.DB_ROOT}/users/${record}`);
              const userSnap = await get(userRef);
              if (userSnap.exists()) {
                email = userSnap.val().email;
              }
            }
          } else if (record && typeof record === "object") {
            if (record.email) {
              email = record.email;
            } else if (record.uid) {
              const userRef = ref(window.App.db, `${window.App.DB_ROOT}/users/${record.uid}`);
              const userSnap = await get(userRef);
              if (userSnap.exists()) {
                email = userSnap.val().email;
              }
            }
          }

          if (!email) {
            window.App.showToast("Could not resolve email for this username.", "error");
            return;
          }

          await sendPasswordResetEmail(window.App.auth, email);
          window.App.showToast("Password reset email sent. Check your inbox.", "success");
        } catch (error) {
          console.error("Password reset error:", error);
          window.App.showToast("Could not send password reset email.", "error");
        }
      });
    });
  </script>
</body>
</html>
