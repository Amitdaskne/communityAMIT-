<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityAMIT - My Contributions</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>

  <div class="app-container" style="margin-top: 10px;">
    <!-- Navigation row -->
    <div>
      <a href="profile.html" class="btn btn-sm">
        <i data-lucide="arrow-left"></i> Profile
      </a>
    </div>

    <!-- Title Header -->
    <div style="border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 8px;">
      <h3 style="font-size: 16px; color: white; letter-spacing: 1px;">My Contributions</h3>
    </div>

    <!-- My Posts List -->
    <div id="my-posts-stream-container" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
      <div class="glass-card shimmer shimmer-card"></div>
    </div>
  </div>

  <!-- Shared Modal Editor Overlay (Hidden Initially) -->
  <div id="edit-modal-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; padding: 16px;">
    <div class="glass-card" style="max-width: 500px; border-color: rgba(255, 255, 255, 0.15);">
      <h3 class="comments-section-title" style="margin-bottom: 16px; font-size:18px;"><i data-lucide="edit-3"></i> Edit Broadcast Node</h3>
      <form id="modal-edit-form-id">
        <input type="hidden" id="modal-post-id">
        <div class="form-group">
          <label class="form-label" for="modal-post-title">Title</label>
          <input type="text" id="modal-post-title" class="input-glass" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="modal-post-content">Content Body</label>
          <textarea id="modal-post-content" class="input-glass" rows="6" style="resize:vertical;" required></textarea>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 20px;">
          <button type="button" class="btn w-full" id="btn-modal-cancel-id">Cancel</button>
          <button type="submit" class="btn btn-primary w-full" id="btn-modal-save-id">Save Update</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Shared Footer & Bottom Navigation -->
  <div id="footer-placeholder"></div>
  <div id="nav-placeholder"></div>

  <!-- App logic & SDK modules -->
  <script type="module" src="/src/js/app.js"></script>
  <script type="module">
    import { ref, onValue, update, remove } from "firebase/database";
    import { onAuthStateChanged } from "firebase/auth";

    document.addEventListener("DOMContentLoaded", () => {
      const postsContainer = document.getElementById("my-posts-stream-container");
      
      // Modal components
      const editModal = document.getElementById("edit-modal-overlay");
      const modalForm = document.getElementById("modal-edit-form-id");
      const modalPostId = document.getElementById("modal-post-id");
      const modalTitle = document.getElementById("modal-post-title");
      const modalContent = document.getElementById("modal-post-content");
      const btnModalCancel = document.getElementById("btn-modal-cancel-id");
      const btnModalSave = document.getElementById("btn-modal-save-id");

      let currentUid = null;

      onAuthStateChanged(window.App.auth, (user) => {
        if (!user) return;
        currentUid = user.uid;
        initContributionsListener();
      });

      function initContributionsListener() {
        const postsRef = ref(window.App.db, `${window.App.DB_ROOT}/posts`);
        
        onValue(postsRef, (snapshot) => {
          postsContainer.innerHTML = "";
          
          if (!snapshot.exists()) {
            renderEmptyContributions();
            return;
          }

          const obj = snapshot.val();
          const list = Object.keys(obj)
            .map(key => ({ id: key, ...obj[key] }))
            .filter(post => post.uid === currentUid)
            .sort((a,b) => b.createdAt - a.createdAt);

          if (list.length === 0) {
            renderEmptyContributions();
            return;
          }

          list.forEach(post => {
            const likesCount = post.likes ? Object.keys(post.likes).length : 0;
            const commentsCount = post.comments ? Object.keys(post.comments).length : 0;

            const row = document.createElement("div");
            row.className = "glass-card post-card";

            let mediaHTML = "";
            if (post.image) {
              mediaHTML = `
                <div class="post-image-container" style="max-height:180px;">
                  <img src="${post.image}" class="post-image" alt="Thumbnail" referrerpolicy="no-referrer">
                </div>
              `;
            }

            row.innerHTML = `
              <div class="post-header">
                <div class="post-meta">
                  <span class="community-badge" style="background:rgba(255,255,255,0.05); color:white;">c/${post.communityName}</span>
                  <span class="post-time">${window.App.formatRelativeTime(post.createdAt)}</span>
                </div>
              </div>

              <h3 class="post-title">${escapeHTML(post.title)}</h3>
              <p class="post-content" style="max-height:80px; overflow:hidden; text-overflow:ellipsis;">${escapeHTML(post.content)}</p>
              ${mediaHTML}

              <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(255,255,255,0.05); padding-top:12px; margin-top:8px;">
                <div style="display:flex; gap:10px; font-size:12px; color:var(--text-secondary);">
                  <span><i data-lucide="heart" style="width:12px; height:12px; display:inline-block; vertical-align:middle;"></i> ${likesCount} to local upvotes</span>
                  <span><i data-lucide="message-square" style="width:12px; height:12px; display:inline-block; vertical-align:middle;"></i> ${commentsCount} replies</span>
                </div>

                <div style="display:flex; gap:8px;">
                  <button class="btn btn-sm btn-edit" data-id="${post.id}" data-title="${encodeURIComponent(post.title)}" data-content="${encodeURIComponent(post.content)}">
                    <i data-lucide="edit-2"></i> Edit
                  </button>
                  <button class="btn btn-sm btn-danger btn-delete" data-id="${post.id}">
                    <i data-lucide="trash-2"></i> Delete
                  </button>
                </div>
              </div>
            `;

            postsContainer.appendChild(row);

            // Row Event bindings
            row.querySelector(".btn-edit").addEventListener("click", (e) => {
              const btn = e.currentTarget;
              openEditorModal(btn.dataset.id, decodeURIComponent(btn.dataset.title), decodeURIComponent(btn.dataset.content));
            });

            row.querySelector(".btn-delete").addEventListener("click", (e) => {
              const btn = e.currentTarget;
              handleDeletePost(btn.dataset.id);
            });
          });

          window.lucide.createIcons();
        });
      }

      function renderEmptyContributions() {
        postsContainer.innerHTML = `
          <div class="glass-card empty-state">
            <i data-lucide="folder-open"></i>
            <h3>No Contributions Yet</h3>
            <p>You haven't transmitted any broadcasts to feed streams yet.</p>
            <a href="create-post.html" class="btn btn-primary mt-12 btn-sm">
              <i data-lucide="plus"></i> Make First Broadcast
            </a>
          </div>
        `;
        window.lucide.createIcons();
      }

      // Deletion Handler
      function handleDeletePost(postId) {
        window.App.openPopup(
          "Delete Post",
          "Are you absolutely sure you want to delete this broadcast? This action cannot be reverted.",
          {
            icon: "⚠",
            type: "danger",
            confirmText: "Delete",
            cancelText: "Cancel",
            onConfirm: async () => {
              const targetRef = ref(window.App.db, `${window.App.DB_ROOT}/posts/${postId}`);
              try {
                await remove(targetRef);
                window.App.showToast("Broadcast de-referenced successfully.", "success");
              } catch (e) {
                console.error(e);
                window.App.showToast("Failed to remove node.", "error");
              }
            }
          }
        );
      }

      // Modal management
      function openEditorModal(id, title, content) {
        modalPostId.value = id;
        modalTitle.value = title;
        modalContent.value = content;
        editModal.style.display = "flex";
        window.lucide.createIcons();
      }

      function closeEditorModal() {
        editModal.style.display = "none";
      }

      btnModalCancel.addEventListener("click", closeEditorModal);

      modalForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const id = modalPostId.value;
        const title = modalTitle.value.trim();
        const content = modalContent.value.trim();

        if (!title || !content) {
          window.App.showToast("Input cells cannot be empty.", "error");
          return;
        }

        window.App.setButtonLoading(btnModalSave, true);

        const targetRef = ref(window.App.db, `${window.App.DB_ROOT}/posts/${id}`);
        try {
          await update(targetRef, {
            title: title,
            content: content
          });

          window.App.showToast("Broadcast modified successfully.", "success");
          closeEditorModal();
        } catch (err) {
          console.error(err);
          window.App.showToast("Failed to write updates.", "error");
        } finally {
          window.App.setButtonLoading(btnModalSave, false);
        }
      });

      function escapeHTML(str) {
        if (!str) return "";
        return str.replace(/[&<>'"]/g, 
          tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
          }[tag] || tag)
        );
      }
    });
  </script>
</body>
</html>
