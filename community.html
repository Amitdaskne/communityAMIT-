<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommunityAMIT - Community Portal</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Shared Header -->
  <div id="header-placeholder"></div>

  <div class="app-container" style="margin-top: 10px;">
    <!-- Community Details Glass Header Card -->
    <div id="community-meta-card-container" style="width: 100%;">
      <div class="glass-card shimmer" style="height: 140px;"></div>
    </div>

    <!-- Feed Title Header -->
    <div style="border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 8px; margin-top: 10px;">
      <h3 style="font-size: 16px; color: white; letter-spacing: 1px;" id="community-posts-banner-id">c/ posts</h3>
    </div>

    <!-- Posts Filtered Stream -->
    <div id="community-posts-stream-id" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
      <div class="glass-card shimmer shimmer-card"></div>
    </div>
  </div>

  <!-- Shared Footer & Bottom Navigation -->
  <div id="footer-placeholder"></div>
  <div id="nav-placeholder"></div>

  <!-- App logic & SDK modules -->
  <script type="module" src="/src/js/app.js"></script>
  <script type="module">
    import { ref, get, set, remove, onValue } from "firebase/database";
    import { onAuthStateChanged } from "firebase/auth";

    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const communityId = urlParams.get("id");

      if (!communityId) {
        window.App.showToast("No community specified.", "error");
        setTimeout(() => { window.location.href = "index.html"; }, 1200);
        return;
      }

      const metaContainer = document.getElementById("community-meta-card-container");
      const postsContainer = document.getElementById("community-posts-stream-id");
      const sectionBanner = document.getElementById("community-posts-banner-id");

      let currentUid = null;

      onAuthStateChanged(window.App.auth, (user) => {
        if (user) {
          currentUid = user.uid;
        }
        initCommunityStreams();
      });

      function initCommunityStreams() {
        // Community details listener
        const commRef = ref(window.App.db, `${window.App.DB_ROOT}/communities/${communityId}`);
        onValue(commRef, (snapshot) => {
          if (!snapshot.exists()) {
            metaContainer.innerHTML = `
              <div class="glass-card community-header">
                <div class="community-meta-wrap">
                  <h2 class="community-title">c/${communityId}</h2>
                  <p class="community-sub" style="margin-top: 4px;">This community hasn't been officially mapped yet.</p>
                </div>
                <a href="create-post.html" class="btn btn-primary btn-sm">
                  Initialize Community
                </a>
              </div>
            `;
            sectionBanner.textContent = `c/${communityId} broadcasts (0)`;
            postsContainer.innerHTML = `
              <div class="glass-card empty-state">
                <i data-lucide="compass"></i>
                <h3>Uncharted Territory</h3>
                <p>Be the pioneer! Create a broadcast tagged c/${communityId} to build this community.</p>
              </div>
            `;
            window.lucide.createIcons();
            return;
          }

          const comm = snapshot.val();
          renderCommunityHeader(comm);
        });

        // Community posts stream
        const postsRef = ref(window.App.db, `${window.App.DB_ROOT}/posts`);
        onValue(postsRef, (snapshot) => {
          postsContainer.innerHTML = "";
          
          if (!snapshot.exists()) {
            renderEmptyPosts();
            return;
          }

          const obj = snapshot.val();
          const filteredArr = Object.keys(obj)
            .map(key => ({ id: key, ...obj[key] }))
            .filter(post => post.communityId === communityId)
            .sort((a,b) => b.createdAt - a.createdAt);

          sectionBanner.textContent = `c/${communityId} broadcasts (${filteredArr.length})`;

          if (filteredArr.length === 0) {
            renderEmptyPosts();
            return;
          }

          filteredArr.forEach(post => {
            const likesCount = post.likes ? Object.keys(post.likes).length : 0;
            const commentsCount = post.comments ? Object.keys(post.comments).length : 0;
            const savesCount = post.saves ? Object.keys(post.saves).length : 0;

            const isLiked = currentUid && post.likes && post.likes[currentUid] === true;
            const isSaved = currentUid && post.saves && post.saves[currentUid] === true;

            const postCard = document.createElement("div");
            postCard.className = "glass-card post-card";

            let imgHTML = "";
            if (post.image) {
              imgHTML = `
                <div class="post-image-container">
                  <img src="${post.image}" class="post-image" alt="Post graphic" referrerpolicy="no-referrer">
                </div>
              `;
            }

            const authorAvatar = post.profilePicture || `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(post.username || 'A')}`;

            postCard.innerHTML = `
              <div class="post-header">
                <div class="post-meta">
                  <span class="avatar-bubble" style="width:28px; height:28px; font-size:12px; overflow:hidden;">
                    <img src="${authorAvatar}" alt="Avatar" style="width:100%; height:100%; object-fit:cover; border-radius:50%;" referrerpolicy="no-referrer">
                  </span>
                  <a href="profile-view.html?id=${post.uid}" class="author-name">u/${post.username}</a>
                  <span class="post-time">${window.App.formatRelativeTime(post.createdAt)}</span>
                </div>
              </div>

              <a href="post.html?id=${post.id}" class="post-title">${escapeHTML(post.title)}</a>
              <p class="post-content">${escapeHTML(post.content)}</p>
              
              ${imgHTML}

              <div class="post-actions">
                <button class="action-btn like-btn ${isLiked ? 'active' : ''}" data-post-id="${post.id}">
                  <i data-lucide="heart"></i>
                  <span>${likesCount}</span>
                </button>
                <a href="comments.html?id=${post.id}" class="action-btn">
                  <i data-lucide="message-square"></i>
                  <span>${commentsCount}</span>
                </a>
                <button class="action-btn save-btn ${isSaved ? 'active' : ''}" data-post-id="${post.id}">
                  <i data-lucide="bookmark"></i>
                  <span>${savesCount}</span>
                </button>
              </div>
            `;

            postsContainer.appendChild(postCard);

            postCard.querySelector(".like-btn").addEventListener("click", () => handlePostToggle(post.id, "likes", isLiked));
            postCard.querySelector(".save-btn").addEventListener("click", () => handlePostToggle(post.id, "saves", isSaved));
          });

          window.lucide.createIcons();
        });
      }

      function renderCommunityHeader(comm) {
        const membersCount = comm.members ? Object.keys(comm.members).length : 0;
        const isJoined = currentUid && comm.members && comm.members[currentUid] === true;

        metaContainer.innerHTML = `
          <div class="glass-card community-header" style="border-color: rgba(56, 189, 248, 0.25);">
            <div class="community-meta-wrap">
              <span class="community-sub" style="color:var(--accent-color); font-weight:bold; letter-spacing:1px; text-transform:uppercase;">Decentralized Node</span>
              <h1 class="community-title" style="font-size:24px; text-shadow:0 0 10px rgba(255,255,255,0.1);">c/${comm.name}</h1>
              <p class="community-sub">${escapeHTML(comm.description)}</p>
              <p class="community-sub" style="margin-top: 10px; font-weight:bold; color:white;">
                <i data-lucide="users" style="width:14px; height:14px; display:inline-block; vertical-align:middle; margin-right:4px;"></i> ${membersCount} Members registered
              </p>
            </div>
            
            <button class="btn ${isJoined ? 'btn-danger' : 'btn-primary'} btn-sm" id="btn-toggle-membership-id" style="min-width:110px;">
              ${isJoined ? '<i data-lucide="minus"></i> Leave' : '<i data-lucide="plus"></i> Join'}
            </button>
          </div>
        `;

        document.getElementById("btn-toggle-membership-id").addEventListener("click", () => handleToggleMembership(isJoined));
        window.lucide.createIcons();
      }

      async function handleToggleMembership(isJoined) {
        if (!currentUid) {
          window.App.showToast("Authenticate credential parameters to register membership.", "error");
          return;
        }

        const memberRef = ref(window.App.db, `${window.App.DB_ROOT}/communities/${communityId}/members/${currentUid}`);
        try {
          if (isJoined) {
            await remove(memberRef);
            window.App.showToast(`Left c/${communityId}`, "info");
          } else {
            await set(memberRef, true);
            window.App.showToast(`Joined c/${communityId}!`, "success");
          }
        } catch (e) {
          console.error(e);
          window.App.showToast("Failed to update membership path.", "error");
        }
      }

      async function handlePostToggle(postId, type, isActive) {
        if (!currentUid) {
          window.App.showToast("Access key required.", "error");
          return;
        }

        const actRef = ref(window.App.db, `${window.App.DB_ROOT}/posts/${postId}/${type}/${currentUid}`);
        try {
          if (isActive) {
            await remove(actRef);
          } else {
            await set(actRef, true);
          }
        } catch (e) {
          console.error(e);
        }
      }

      function renderEmptyPosts() {
        postsContainer.innerHTML = `
          <div class="glass-card empty-state">
            <i data-lucide="file-warning"></i>
            <h3>No broadcasts found</h3>
            <p>The channel is currently transmitting quiet codes.</p>
            <a href="create-post.html" class="btn btn-primary mt-12 btn-sm">
              <i data-lucide="edit"></i> Transmit New Post
            </a>
          </div>
        `;
        window.lucide.createIcons();
      }

      function escapeHTML(str) {
        if (!str) return "";
        return str.replace(/[&<>'"]/g, 
          tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
          }[tag] || tag)
        );
      }
    });
  </script>
</body>
</html>
